<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyScheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#0f172a;
color:white;
}
.card{
background:#1e293b;
border:1px solid #334155;
border-radius:20px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>

</head>
<body>

<!-- Header -->
<header class="flex justify-between items-center p-6 border-b border-slate-700">

<h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-cyan-400 bg-clip-text text-transparent">
MyScheduler
</h1>

<button
id="ownerBtn"
class="px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700">
Owner Dashboard
</button>

</header>

<!-- Visitor Dashboard -->
<div class="max-w-7xl mx-auto p-6">
<div class="card mt-6">

<h2 class="text-xl font-bold mb-4">
AI Assistant
</h2>

<input
id="userMessage"
class="w-full p-3 rounded-xl bg-slate-800 mb-3"
placeholder="Ask AI...">

<button
onclick="sendMessage()"
class="bg-indigo-600 px-5 py-3 rounded-xl">
Send
</button>

<div
id="chatBox"
class="mt-5 space-y-3">
</div>

</div>
<h2 class="text-2xl font-bold mb-6">
Visitor Dashboard
</h2>

<div class="grid lg:grid-cols-3 gap-6">

<!-- Booking Card -->
<div class="card">

<h3 class="text-xl font-semibold mb-5">
Book Meeting
</h3>

<input class="w-full p-3 rounded-xl bg-slate-800 mb-3"
placeholder="Name">

<input class="w-full p-3 rounded-xl bg-slate-800 mb-3"
placeholder="Email">

<input class="w-full p-3 rounded-xl bg-slate-800 mb-3"
placeholder="Meeting Purpose">

<input type="date"
class="w-full p-3 rounded-xl bg-slate-800 mb-3">

<input type="time"
class="w-full p-3 rounded-xl bg-slate-800 mb-3">

<input type="time"
class="w-full p-3 rounded-xl bg-slate-800 mb-5">

<button class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 via-purple-600 to-cyan-500">
Submit Request
</button>

</div>

<!-- Availability Card -->
<div class="card">

<h3 class="text-xl font-semibold mb-5">
Available Slots
</h3>

<div class="space-y-3">

<div class="bg-slate-800 p-3 rounded-xl">
09:00 AM - 10:00 AM
</div>

<div class="bg-slate-800 p-3 rounded-xl">
10:00 AM - 11:00 AM
</div>

<div class="bg-slate-800 p-3 rounded-xl">
02:00 PM - 03:00 PM
</div>

</div>

</div>

<!-- My Requests -->
<div class="card">

<h3 class="text-xl font-semibold mb-5">
My Requests
</h3>

<div class="space-y-3">

<div class="bg-slate-800 p-3 rounded-xl">
Pending Request
</div>

<div class="bg-slate-800 p-3 rounded-xl">
Approved Meeting
</div>

</div>

</div>

</div>
</div>

<!-- Password Modal -->
<div
id="passwordModal"
class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">

<div class="bg-slate-900 p-8 rounded-2xl w-[350px]">

<h2 class="text-2xl font-bold mb-5">
Owner Login
</h2>

<input
id="ownerPassword"
type="password"
placeholder="Enter Password"
class="w-full p-3 rounded-xl bg-slate-800 mb-4">

<button
class="w-full py-3 rounded-xl bg-indigo-600">
Login
</button>

</div>

</div>
<script src="script.js"></script>
</body>
</html>
